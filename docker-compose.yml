version: '3.8'
services:
  db:
    image: postgres:15
    container_name: marketplace_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: marketplace
    ports:
      - "5432:5432"
  redis:
    image: redis:alpine
    container_name: marketplace_redis
    ports:
      - "6379:6379"